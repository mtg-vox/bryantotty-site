<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" shape-rendering="geometricPrecision">
  <!-- Dark rounded background to match the site palette -->
  <rect width="64" height="64" rx="10" fill="#050505"/>
  <!-- Subtle red accent bar at the bottom for brand recognition at very small sizes -->
  <rect x="0" y="58" width="64" height="6" fill="#c8102e"/>
  <!-- BT in matching site logo style (Inter Black, ultra-tight tracking) -->
  <g font-family="Inter, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-weight="900" font-size="48" letter-spacing="-2.5">
    <text x="6"  y="46" fill="#ffffff">B</text>
    <text x="34" y="46" fill="#c8102e">T</text>
  </g>
</svg>
