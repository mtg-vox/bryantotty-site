<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Harvard HBX CORe — Business Analytics, Economics for Managers, Financial Accounting" shape-rendering="geometricPrecision">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0408"/>
      <stop offset="1" stop-color="#3a0a14"/>
    </linearGradient>
    <linearGradient id="crimson" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c8102e"/>
      <stop offset="1" stop-color="#8a0a20"/>
    </linearGradient>
    <linearGradient id="shieldGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4af6a"/>
      <stop offset="1" stop-color="#8c6a3a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0" stop-color="#c8102e" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#c8102e" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>
  <ellipse cx="600" cy="338" rx="520" ry="280" fill="url(#glow)"/>

  <!-- Center academic shield -->
  <g transform="translate(600 338)">
    <!-- Shield outline -->
    <path d="M-110 -150 L110 -150 Q140 -150 140 -120 L140 60 Q140 110 100 140 L20 195 Q0 207 -20 195 L-100 140 Q-140 110 -140 60 L-140 -120 Q-140 -150 -110 -150 Z"
          fill="url(#crimson)"
          stroke="url(#shieldGold)"
          stroke-width="3"/>

    <!-- Three vertical pillars representing the three courses -->
    <g fill="#f5e6c8" opacity="0.92">
      <!-- Pillar 1 -->
      <rect x="-78" y="-90" width="36" height="160" rx="4"/>
      <rect x="-86" y="-100" width="52" height="14" rx="2"/>
      <rect x="-86" y="68" width="52" height="14" rx="2"/>
      <!-- Pillar 2 -->
      <rect x="-18" y="-90" width="36" height="160" rx="4"/>
      <rect x="-26" y="-100" width="52" height="14" rx="2"/>
      <rect x="-26" y="68" width="52" height="14" rx="2"/>
      <!-- Pillar 3 -->
      <rect x="42" y="-90" width="36" height="160" rx="4"/>
      <rect x="34" y="-100" width="52" height="14" rx="2"/>
      <rect x="34" y="68" width="52" height="14" rx="2"/>
    </g>

    <!-- Roof / pediment line -->
    <path d="M-100 -110 L100 -110" stroke="url(#shieldGold)" stroke-width="2"/>
    <path d="M-115 -115 L0 -135 L115 -115" fill="none" stroke="url(#shieldGold)" stroke-width="2.5"/>

    <!-- Banner with text -->
    <g transform="translate(0 120)">
      <rect x="-105" y="-14" width="210" height="28" rx="3" fill="#1a0408" stroke="url(#shieldGold)" stroke-width="1.5"/>
      <text x="0" y="6" text-anchor="middle"
            font-family="Georgia, 'Times New Roman', serif"
            font-weight="700"
            font-size="14"
            letter-spacing="6"
            fill="#d4af6a">CORE · 2018</text>
    </g>
  </g>

  <!-- Three course chips at bottom -->
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="13" letter-spacing="2.5" fill="#f5e6c8" opacity="0.85">
    <g transform="translate(280 580)">
      <rect x="-110" y="-22" width="220" height="44" rx="6" fill="#1a0408" stroke="#c8102e" stroke-width="1.5" opacity="0.9"/>
      <text x="0" y="5" text-anchor="middle">BUSINESS ANALYTICS</text>
    </g>
    <g transform="translate(600 580)">
      <rect x="-130" y="-22" width="260" height="44" rx="6" fill="#1a0408" stroke="#c8102e" stroke-width="1.5" opacity="0.9"/>
      <text x="0" y="5" text-anchor="middle">ECONOMICS FOR MANAGERS</text>
    </g>
    <g transform="translate(920 580)">
      <rect x="-115" y="-22" width="230" height="44" rx="6" fill="#1a0408" stroke="#c8102e" stroke-width="1.5" opacity="0.9"/>
      <text x="0" y="5" text-anchor="middle">FINANCIAL ACCOUNTING</text>
    </g>
  </g>

  <!-- Top corner brand tag -->
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" letter-spacing="3" fill="#d4af6a" opacity="0.6">
    <text x="48" y="56">HARVARD BUSINESS SCHOOL · ONLINE</text>
  </g>
  <g font-family="'JetBrains Mono', 'Courier New', monospace" font-size="11" letter-spacing="3" fill="#d4af6a" opacity="0.6">
    <text x="1152" y="56" text-anchor="end">CREDENTIAL OF READINESS</text>
  </g>
</svg>
